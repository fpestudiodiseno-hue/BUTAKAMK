<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Butaca MK - Galería</title>

    <link rel="stylesheet" href="galeria.css">

</head>

<div id="page-transition"></div>

<body>

<div class="layout">

    <!-- ====================================== -->
    <!-- MENU SUPERIOR -->
    <!-- ====================================== -->

    <!-- MENU -->

    <aside class="sidebar">

        <!-- LOGO UNIVERSIDAD -->

        <img
            class="logo-u"
            src="assets2/logos1/TOULOUSE-logo-1.jpg"
            alt="">

        <!-- MENU -->

        <nav class="tabs">

            <button class="tab-btn" data-tab="cinefilos">
                CINEFILOS
            </button>

            <button class="tab-btn" data-tab="inspiracion">
                INSPIRACIÓN
            </button>

            <button class="tab-btn" data-tab="expediente">
                EXPEDIENTE
            </button>

            <button class="tab-btn" data-tab="proceso">
                PROCESO
            </button>

            <button class="tab-btn" data-tab="modelado3d">
                MODELO 3D
            </button>

            <button class="tab-btn" data-tab="sobremi">
                SOBRE MI
            </button>

        </nav>

        <!-- LOGO BUTACA -->

        <a href="/index.html"
           class="home-logo">

            <img src="assets2/logos1/mk-logo-1.jpg">

        </a>

    </aside>

    <!-- ====================================== -->
    <!-- SLIDER PRINCIPAL -->
    <!-- ====================================== -->

    <section class="slider-container">

        <button class="flecha izquierda">
            ❮
        </button>

        <img id="sliderImage"
             src=""
             alt="">

        <button class="flecha derecha">
            ❯
        </button>

        <!-- INDICADORES -->

        <div id="dots"
             class="dots">

        </div>

    </section>

</div>

<script src="galeria.js"></script>
<script src="/js/pagetransition.js"></script>

</body>

</html>
